<!DOCTYPE html>
<html lang="ko">
<head>

        :root {

        body {

            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .step-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            color: #555;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            display: inline-block;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--primary-color);
        }
        .hidden {
            display: none;
        }
        .result-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .result-section {
            margin-bottom: 20px;
        }
        .result-section h3 {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            background-color: #eaf2fb;
            padding: 8px 12px;
            border-radius: 5px;
        }
        .result-section p, .result-section ul {
            margin: 0;
            padding-left: 20px;
            color: #444;
        }
        .subject-box {
            margin-bottom: 10px;
        }
        .subject-box strong {
            color: #2c3e50;
        }

        </div>

</div>

        // 나머지 계열 요청 시 이곳에 데이터를 추가하게 됩니다.

    // 1단계 계열 선택 처리
    function handleCategoryChange() {
        const category = document.getElementById("categorySelect").value;
        const step2Box = document.getElementById("step2Box");
        const majorSelect = document.getElementById("majorSelect");
        const resultBox = document.getElementById("resultBox");

        // 초기화
        majorSelect.innerHTML = '<option value="">세부 학과를 선택해주세요</option>';
        resultBox.classList.add("hidden");

        if (category && majorData[category]) {
            step2Box.classList.remove("hidden");
            const majors = Object.keys(majorData[category]);
            majors.forEach(major => {
                const option = document.createElement("option");
                option.value = major;
                option.textContent = major;
                majorSelect.appendChild(option);
            });
        } else {
            step2Box.classList.add("hidden");
            if (category) alert("해당 계열의 데이터가 아직 추가되지 않았습니다. 개발자(AI)에게 추가 요청을 해주세요!");
        }
    }

    // 2단계 학과 선택 및 결과 출력 처리
    function handleMajorChange() {
        const category = document.getElementById("categorySelect").value;
        const major = document.getElementById("majorSelect").value;
        const resultBox = document.getElementById("resultBox");

        if (category && major && majorData[category][major]) {
            const data = majorData[category][major];
            
            document.getElementById("resultTitle").textContent = major;
            document.getElementById("resOverview").textContent = data.overview;
            document.getElementById("resCareer").textContent = data.career;
            
            document.getElementById("resSubGen").textContent = data.subGeneral;
            document.getElementById("resSubCar").textContent = data.subCareer;
            document.getElementById("resSubFus").textContent = data.subFusion;

            // 리스트 매핑 (역량)
            const compList = document.getElementById("resCompetency");
            compList.innerHTML = "";
            data.competencies.forEach(item => {
                const li = document.createElement("li");
                li.textContent = item;
                compList.appendChild(li);
            });

            // 리스트 매핑 (도서)
            const bookList = document.getElementById("resBooks");
            bookList.innerHTML = "";
            data.books.forEach(item => {
                const li = document.createElement("li");
                li.textContent = item;
                bookList.appendChild(li);
            });

            resultBox.classList.remove("hidden");
        } else {
            resultBox.classList.add("hidden");
        }
    }
</script>
